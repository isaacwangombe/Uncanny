# 🔴 Redirect HTTP → HTTPS
server {
    listen 80;
    server_name uncannyvalleycomics.com www.uncannyvalleycomics.com;

    return 301 https://$host$request_uri;
}

# 🟢 HTTPS SERVER (main)
server {
    listen 443 ssl;
    server_name uncannyvalleycomics.com www.uncannyvalleycomics.com;

    ssl_certificate /etc/letsencrypt/live/uncannyvalleycomics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uncannyvalleycomics.com/privkey.pem;

    client_max_body_size 20M;

    # Runtime config for frontend
    location = /config.js {
        default_type application/javascript;
        return 200 'window.API_BASE_URL_SHORT="https://uncannyvalleycomics.com";';
    }

    # ✅ Static files
    location /static/ {
        alias /app/staticfiles/;
        try_files $uri @django_static;
    }

    location @django_static {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ✅ API
    location /api/ {
        client_max_body_size 20M;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ✅ Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ✅ Auth (CRITICAL for Google login)
    location /accounts/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ✅ React frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}