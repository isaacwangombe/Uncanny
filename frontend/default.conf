# 🔴 HTTP → HTTPS redirect
server {
    listen 80;
    server_name uncannyvalleycomics.com www.uncannyvalleycomics.com;

    return 301 https://$host$request_uri;
}

# 🟢 HTTPS server
server {
    listen 443 ssl;
    server_name uncannyvalleycomics.com www.uncannyvalleycomics.com;

    ssl_certificate /etc/letsencrypt/live/uncannyvalleycomics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uncannyvalleycomics.com/privkey.pem;

    client_max_body_size 20M;

    location = /config.js {
        default_type application/javascript;
        return 200 'window.API_BASE_URL_SHORT="";';
    }

    location /static/ {
        alias /app/staticfiles/;
        try_files $uri @django_static;
    }

    location @django_static {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /accounts/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}